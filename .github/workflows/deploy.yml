name: Deploy na Windows službu

on:
  deployment:

  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'ID běhu workflow s artefaktem'
        required: true
        type: string
      artifact_name:
        description: 'Název artefaktu'
        required: false
        default: 'IoTDeployer'
        type: string

permissions:
  contents: read
  actions: read
  deployments: write

jobs:
  deploy:
    runs-on: [self-hosted, dotnet]
    environment: ${{ github.event.deployment.environment || 'manual' }}

    env:
      ARTIFACT_RUN_ID: ${{ github.event.deployment.payload.artifact_run_id || inputs.artifact_run_id }}
      ARTIFACT_NAME: ${{ github.event.deployment.payload.artifact_name || inputs.artifact_name || 'IoTDeployer' }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}
      TARGET_PATH: ${{ vars.TARGET_PATH }}

    steps:
      - name: Kontrola vstupů
        shell: pwsh
        run: |
          if (-not $env:ARTIFACT_RUN_ID) { throw 'Chybí artifact_run_id v payloadu deploymentu.' }
          if (-not $env:SERVICE_NAME)    { throw 'Chybí proměnná prostředí SERVICE_NAME (vars.SERVICE_NAME).' }
          if (-not $env:TARGET_PATH)     { throw 'Chybí proměnná prostředí TARGET_PATH (vars.TARGET_PATH).' }

      - name: Stažení artefaktu
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}\deploy_payload
          run-id: ${{ env.ARTIFACT_RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zastavení služby
        shell: pwsh
        run: |
          $svc = Get-Service -Name $env:SERVICE_NAME -ErrorAction Stop
          if ($svc.Status -ne 'Stopped') {
            Stop-Service -Name $env:SERVICE_NAME -Force
            $svc.WaitForStatus('Stopped', '00:01:00')
          }

      - name: Kopírování souborů
        shell: pwsh
        run: |
          if (-not (Test-Path $env:TARGET_PATH)) {
            New-Item -ItemType Directory -Path $env:TARGET_PATH -Force | Out-Null
          }
          Copy-Item -Path "$env:RUNNER_TEMP\deploy_payload\*" -Destination $env:TARGET_PATH -Recurse -Force

      - name: Spuštění služby
        if: always()
        shell: pwsh
        run: |
          Start-Service -Name $env:SERVICE_NAME
          (Get-Service -Name $env:SERVICE_NAME).WaitForStatus('Running', '00:01:00')
